<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Roof Assessment | Neading Remodeling - Jonesboro, AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; }
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); color: white; }
        .form-input { transition: all 0.2s; }
        .form-input:focus { border-color: #c2410c; box-shadow: 0 0 0 3px rgba(194, 65, 12, 0.2); }
    </style>
</head>
<body>
    <div class="max-w-3xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-center mb-8">Neading Remodeling - AI Roof Assessment</h1>
        
        <form id="leadForm">
            <input type="text" id="fullName" placeholder="Full Name" class="form-input w-full p-4 border mb-4" required>
            <input type="tel" id="phone" placeholder="(901) 555-0199" class="form-input w-full p-4 border mb-4" required>
            <input type="email" id="email" placeholder="Email" class="form-input w-full p-4 border mb-4" required>
            <input type="text" id="address" placeholder="Address" class="form-input w-full p-4 border mb-4" required>
            
            <label>Project Type</label>
            <select id="projectType" class="form-input w-full p-4 border mb-4">
                <option value="Roof Replacement">Roof Replacement</option>
                <option value="Storm Damage">Storm Damage</option>
            </select>

            <label>Upload Roof Photos</label>
            <input type="file" id="photoInput" multiple accept="image/*" class="form-input w-full p-4 border mb-4">

            <button type="submit" id="submitBtn" class="w-full py-6 bg-orange-600 text-white font-bold text-xl">
                ANALYZE MY ROOF WITH AI
            </button>
        </form>

        <div id="result" class="mt-8 hidden"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://mrhvhcloeqcqmbicxcbu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_T3FswYTFVQP3Z8q8Xriwlg_GVMjprsr";
        const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/analyze-roof-photos`;

        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'UPLOADING AND ANALYZING...';
            btn.disabled = true;

            try {
                alert("Starting upload...");

                const files = document.getElementById('photoInput').files;
                if (files.length === 0) {
                    alert("Please select at least one photo");
                    btn.disabled = false;
                    btn.textContent = 'ANALYZE MY ROOF WITH AI';
                    return;
                }

                const photoUrls = [];
                for (let file of files) {
                    const fileName = Date.now() + '-' + file.name;
                    const url = `${SUPABASE_URL}/storage/v1/object/lead-photos/${fileName}`;
                    
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'apikey': SUPABASE_ANON_KEY,
                            'Content-Type': file.type,
                            'x-upsert': 'true'
                        },
                        body: file
                    });

                    if (!res.ok) {
                        alert("Upload failed: " + await res.text());
                        throw new Error("Upload failed");
                    }
                    photoUrls.push(`${SUPABASE_URL}/storage/v1/object/public/lead-photos/${fileName}`);
                }

                alert("Photos uploaded. Calling AI...");

                const formData = {
                    fullName: document.getElementById('fullName').value || "Test User",
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value || "test@example.com",
                    address: document.getElementById('address').value || "Jonesboro, AR",
                    projectType: document.getElementById('projectType').value,
                    timeline: "As soon as possible",
                    notes: "",
                    photoUrls: photoUrls
                };

                const res2 = await fetch(EDGE_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify(formData)
                });

                const result = await res2.json();
                alert("AI Response received: " + JSON.stringify(result));

                if (result.success) {
                    document.getElementById('result').innerHTML = `<h2>AI Result:</h2><p>${result.assessment}</p>`;
                    document.getElementById('result').classList.remove('hidden');
                } else {
                    alert("Error: " + result.error);
                }
            } catch (err) {
                alert("Error: " + err.message);
            }

            btn.disabled = false;
            btn.textContent = 'ANALYZE MY ROOF WITH AI';
        });
    </script>
</body>
</html>
