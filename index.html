<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neading AI Roof Assessment | Jonesboro, AR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
        .form-input { transition: all 0.2s; }
        .form-input:focus { border-color: #c2410c; box-shadow: 0 0 0 3px rgba(194, 65, 12, 0.12); }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
            <div class="flex items-center gap-x-3">
                <div class="w-12 h-12 bg-[#c2410c] rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-home text-white text-3xl"></i>
                </div>
                <div>
                    <div class="font-bold text-2xl">Neading Remodeling</div>
                    <div class="text-xs text-slate-500 -mt-1">ROOFING & REMODELING • AI POWERED</div>
                </div>
            </div>
            <a href="tel:9015550199" class="flex items-center gap-x-2 text-slate-700 hover:text-[#c2410c]">
                <i class="fa-solid fa-phone text-[#c2410c]"></i>
                <span class="font-semibold">(901) 555-0199</span>
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero-bg text-white py-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-6xl font-bold mb-6">Get Your Free<br><span class="text-[#c2410c]">AI Roof Assessment</span></h1>
            <p class="text-xl max-w-lg mx-auto">Upload photos or PDF and Grok 4.3 will analyze your roof instantly.</p>
        </div>
    </div>

    <!-- Form -->
    <div class="max-w-3xl mx-auto px-6 -mt-12 relative z-10 pb-16">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            
            <div class="bg-[#0f172a] px-8 py-6 text-white flex items-center gap-x-4">
                <div class="w-14 h-14 bg-[#c2410c] rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-3xl"></i>
                </div>
                <div>
                    <div class="font-bold text-2xl">AI-Powered Roof Assessment</div>
                    <div class="text-[#c2410c] text-sm">Instant • Free • Powered by Grok 4.3</div>
                </div>
            </div>

            <form id="leadForm" class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="fullName" placeholder="Full Name" class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl" required>
                    <input type="tel" name="phone" placeholder="(901) 555-0199" class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl" required>
                </div>
                <input type="email" name="email" placeholder="Email Address" class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl" required>
                <input type="text" name="address" placeholder="Property Address" class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl" required>

                <div>
                    <label class="block font-medium mb-2">Project Type</label>
                    <select name="projectType" class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl">
                        <option value="Roof Replacement">Roof Replacement</option>
                        <option value="Storm Damage Repair">Storm Damage Repair</option>
                        <option value="Roof Repair">Roof Repair</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block font-medium mb-2">Upload Roof Photos or PDF</label>
                    <input type="file" name="photos" multiple accept="image/*,.pdf" class="w-full p-4 border border-slate-300 rounded-2xl">
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full py-5 bg-gradient-to-r from-[#c2410c] to-[#9f1239] text-white font-bold text-xl rounded-3xl">
                    ANALYZE WITH GROK 4.3
                </button>
            </form>

            <div id="result" class="hidden p-8 bg-slate-50 border-t border-slate-200"></div>
        </div>
    </div>

    <script>
    const form = document.getElementById('leadForm');
    const submitBtn = document.getElementById('submitBtn');
    const result = document.getElementById('result');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '🧠 Grok 4.3 analyzing your roof...';
        submitBtn.disabled = true;

        const formData = new FormData(form);

        try {
            const res = await fetch('/api/analyze', {
                method: 'POST',
                body: formData
            });

            const data = await res.json();

            result.classList.remove('hidden');
            result.innerHTML = `
                <div class="bg-green-50 border border-green-200 rounded-3xl p-8">
                    <div class="text-3xl font-bold text-green-800 mb-4">✅ Grok 4.3 Analysis Complete</div>
                    <div class="text-5xl font-bold text-green-700 mb-6">${data.priceRange}</div>
                    <div class="text-lg text-slate-700">${data.summary}</div>
                    
                    <div class="mt-6 bg-orange-50 border-l-4 border-orange-500 p-4 rounded-r-2xl">
                        <p class="font-semibold text-orange-800">📧 Check your email shortly</p>
                        <p class="text-orange-700">You'll receive a full report + link to book your <strong>FREE consultation</strong>.</p>
                    </div>
                </div>
            `;
            result.scrollIntoView({ behavior: "smooth" });

        } catch (err) {
            alert("Grok 4.3 had an issue. Please try again.");
            console.error(err);
        }

        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
    });
    </script>
</body>
</html>
