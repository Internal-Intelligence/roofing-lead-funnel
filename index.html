<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Roof Assessment | Neading Remodeling</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-8">Neading Remodeling - AI Roof Assessment</h1>
        
        <form id="leadForm" class="bg-white p-8 rounded-3xl shadow">
            <input type="text" id="fullName" placeholder="Full Name" class="w-full p-4 border mb-4 rounded-2xl" required>
            <input type="tel" id="phone" placeholder="(901) 555-0199" class="w-full p-4 border mb-4 rounded-2xl" required>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 border mb-4 rounded-2xl" required>
            <input type="text" id="address" placeholder="Address in Jonesboro" class="w-full p-4 border mb-4 rounded-2xl" required>
            
            <select id="projectType" class="w-full p-4 border mb-4 rounded-2xl">
                <option value="Roof Replacement">Roof Replacement</option>
                <option value="Storm Damage Repair">Storm Damage Repair</option>
                <option value="Roof Repair">Roof Repair</option>
            </select>

            <input type="file" id="photoInput" multiple accept="image/*" class="w-full p-4 border mb-6 rounded-2xl">

            <button type="submit" id="submitBtn" class="w-full py-6 bg-orange-600 text-white font-bold text-xl rounded-3xl">
                ANALYZE MY ROOF WITH AI
            </button>
        </form>

        <div id="result" class="mt-8 hidden bg-white p-8 rounded-3xl shadow"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://mrhvhcloeqcqmbicxcbu.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_T3FswYTFVQP3Z8q8Xriwlg_GVMjprsr";
        const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/analyze-roof-photos`;

        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'UPLOADING...';
            btn.disabled = true;

            try {
                const files = document.getElementById('photoInput').files;
                if (files.length === 0) {
                    alert("Please upload at least one photo");
                    btn.disabled = false;
                    btn.textContent = 'ANALYZE MY ROOF WITH AI';
                    return;
                }

                const photoUrls = [];
                
                for (let file of files) {
                    const fileName = Date.now() + '-' + file.name;
                    const uploadUrl = `${SUPABASE_URL}/storage/v1/object/lead-photos/${fileName}`;

                    const uploadRes = await fetch(uploadUrl, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'apikey': SUPABASE_ANON_KEY,
                            'Content-Type': file.type,
                            'x-upsert': 'true'
                        },
                        body: file
                    });

                    if (!uploadRes.ok) {
                        const errorText = await uploadRes.text();
                        throw new Error("Upload failed: " + errorText);
                    }

                    photoUrls.push(`${SUPABASE_URL}/storage/v1/object/public/lead-photos/${fileName}`);
                }

                const formData = {
                    fullName: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    address: document.getElementById('address').value,
                    projectType: document.getElementById('projectType').value,
                    timeline: "As soon as possible",
                    notes: "",
                    photoUrls: photoUrls
                };

                const aiRes = await fetch(EDGE_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify(formData)
                });

                const result = await aiRes.json();

                if (result.success) {
                    document.getElementById('result').innerHTML = `
                        <h2 class="text-2xl font-bold mb-4">AI Analysis Complete</h2>
                        <div class="bg-slate-100 p-6 rounded-2xl whitespace-pre-wrap">${result.assessment}</div>
                    `;
                    document.getElementById('result').classList.remove('hidden');
                } else {
                    alert("AI Error: " + result.error);
                }

            } catch (err) {
                alert("Error: " + err.message);
                console.error(err);
            }

            btn.disabled = false;
            btn.textContent = 'ANALYZE MY ROOF WITH AI';
        });
    </script>
</body>
</html>
