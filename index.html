<script>
const form = document.getElementById('leadForm');
const submitBtn = document.getElementById('submitBtn');
const resultSection = document.getElementById('aiResultSection');

form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const originalText = submitBtn.innerHTML;
    submitBtn.innerHTML = '🧠 Grok 4.3 is analyzing your roof...';
    submitBtn.disabled = true;

    const formData = new FormData(form);

    try {
        const response = await fetch('/api/analyze', {   // This will be your Vercel API route
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        // Show beautiful result on the page
        resultSection.classList.remove('hidden');
        resultSection.innerHTML = `
            <div class="bg-green-50 border border-green-200 rounded-3xl p-8">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-green-500 rounded-2xl flex items-center justify-center text-white text-4xl">✅</div>
                    <div>
                        <div class="text-3xl font-bold text-green-800">Grok 4.3 Analysis Complete</div>
                        <div class="text-green-600">Powered by xAI</div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 mb-6 border border-green-100">
                    <div class="text-sm text-green-600 font-medium mb-1">ROUGH ESTIMATE</div>
                    <div class="text-5xl font-bold text-green-700">${result.priceRange}</div>
                </div>

                <div class="text-lg text-slate-700 leading-relaxed mb-6">
                    ${result.summary}
                </div>

                <div class="bg-orange-50 border-l-4 border-orange-500 p-4 rounded-r-2xl">
                    <p class="font-semibold text-orange-800">📧 Check your email in the next 60 seconds</p>
                    <p class="text-orange-700">You'll receive a detailed report + a link to book your <strong>FREE on-site consultation</strong>.</p>
                </div>
            </div>
        `;

        resultSection.scrollIntoView({ behavior: "smooth" });

    } catch (error) {
        alert("Grok 4.3 had a hiccup. Please try again or call us directly.");
        console.error(error);
    }

    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
});
</script>
